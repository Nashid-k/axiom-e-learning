name: Axiom Architect

on:
  issues:
    types: [opened]

jobs:
  build:
    if: contains(github.event.issue.labels.*.name, 'curriculum-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Generate Curriculum
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/architect.mjs
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add new ${{ github.event.issue.title }} curriculum"
          title: "Axiom Architect: New Curriculum [${{ github.event.issue.title }}]"
          body: "This PR was automatically generated by the Axiom Architect in response to issue #${{ github.event.issue.number }}."
          branch: "architect/new-curriculum"
