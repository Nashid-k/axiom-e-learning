name: Axiom Link Auditor

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Link Checker
        uses: peter-evans/repository-comptroller@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-links: true
          link-checker-args: "--exclude-mailto"
      - name: AI Suggestion (On Failure)
        if: failure()
        run: |
          echo "Broken links detected in Axiom data. Foreman suggests a site inspection."
          # Here we could call an AI to suggest replacements for broken links
